<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini 世界杯球星卡清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .football-decoration {
            position: fixed;
            font-size: 120px;
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
        }

        .football-1 { top: 10%; left: 5%; transform: rotate(-15deg); }
        .football-2 { top: 30%; right: 8%; transform: rotate(25deg); }
        .football-3 { bottom: 20%; left: 10%; transform: rotate(-30deg); }
        .football-4 { bottom: 10%; right: 15%; transform: rotate(15deg); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e8449 0%, #27ae60 50%, #2ecc71 100%);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 204, 113, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 30-30 30L0 30z' fill='%23ffffff' fill-opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        header h1 {
            font-size: 2.5em;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        header h1 .ball {
            font-size: 1.2em;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #fff;
            border: 2px solid #e8e8e8;
            border-radius: 16px;
            padding: 25px 35px;
            text-align: center;
            min-width: 160px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border-color: #27ae60;
        }

        .stat-box .icon {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        .stat-box .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #27ae60;
        }

        .stat-box .label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            font-weight: 500;
        }

        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }

        .legend-color.green {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 2px 8px rgba(46, 204, 113, 0.4);
        }

        .legend-color.red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.4);
        }

        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            max-width: 450px;
            padding: 14px 24px;
            border-radius: 30px;
            border: 2px solid #ddd;
            background: #fff;
            color: #2c3e50;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .search-box input:focus {
            border-color: #27ae60;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.2);
        }

        .search-box input::placeholder {
            color: #95a5a6;
        }

        .continent-section {
            margin-bottom: 40px;
        }

        .continent-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #27ae60;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .continent-icon {
            font-size: 1.3em;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .country-card {
            background: #fff;
            border: 2px solid #e8e8e8;
            border-radius: 16px;
            padding: 22px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .country-card::after {
            content: '⚽';
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 60px;
            opacity: 0.04;
            pointer-events: none;
        }

        .country-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            border-color: #27ae60;
        }

        .country-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px dashed #eee;
        }

        .country-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .country-flag {
            font-size: 1em;
            color: #34495e;
        }

        .country-code {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
        }

        .section-label {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .section-label .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-green {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 2px 5px rgba(46, 204, 113, 0.4);
        }

        .dot-red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 2px 5px rgba(231, 76, 60, 0.4);
        }

        .card-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .card-number {
            width: 50px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: default;
            transition: all 0.2s ease;
        }

        .duplicate {
            background: linear-gradient(135deg, #d5f5e3, #abebc6);
            border: 2px solid #82e0aa;
            color: #1e8449;
        }

        .missing {
            background: linear-gradient(135deg, #fadbd8, #f5b7b1);
            border: 2px solid #f1948a;
            color: #c0392b;
        }

        .empty-message {
            color: #95a5a6;
            font-style: italic;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        footer .ball {
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .stats {
                gap: 15px;
            }

            .stat-box {
                padding: 18px 25px;
                min-width: 130px;
            }

            .stat-box .number {
                font-size: 2em;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .legend {
                gap: 15px;
            }

            .legend-item {
                padding: 10px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>

            {"continent": "欧洲", "country": "ENG", "duplicate": [{"number": 2, "count": 1}, {"number": 4, "count": 2}, {"number": 7, "count": 2}, {"number": 14, "count": 1}, {"number": 15, "count": 1}, {"number": 18, "count": 1}, {"number": 20, "count": 1}], "missing": [6, 11, 13, 17]},
            {"continent": "欧洲", "country": "BIH", "duplicate": [{"number": 1, "count": 1}, {"number": 2, "count": 1}, {"number": 7, "count": 1}, {"number": 11, "count": 1}, {"number": 15, "count": 1}, {"number": 17, "count": 1}], "missing": [6, 9, 13, 14, 19]},
            {"continent": "欧洲", "country": "CRO", "duplicate": [{"number": 3, "count": 1}, {"number": 4, "count": 1}, {"number": 10, "count": 1}, {"number": 15, "count": 1}, {"number": 18, "count": 1}], "missing": [5, 11, 12, 16]},
            {"continent": "欧洲", "country": "SCO", "duplicate": [{"number": 1, "count": 1}, {"number": 7, "count": 1}, {"number": 13, "count": 1}, {"number": 14, "count": 2}], "missing": [3, 6, 10, 16, 17]},
            {"continent": "欧洲", "country": "POR", "duplicate": [{"number": 1, "count": 1}, {"number": 4, "count": 1}, {"number": 5, "count": 1}, {"number": 7, "count": 1}, {"number": 15, "count": 1}, {"number": 17, "count": 1}], "missing": [2, 8, 20]},
            {"continent": "欧洲", "country": "BEL", "duplicate": [{"number": 1, "count": 1}, {"number": 5, "count": 2}, {"number": 12, "count": 1}, {"number": 18, "count": 1}], "missing": []},
            {"continent": "欧洲", "country": "CZE", "duplicate": [{"number": 1, "count": 1}, {"number": 9, "count": 1}, {"number": 10, "count": 1}, {"number": 11, "count": 1}, {"number": 12, "count": 2}, {"number": 17, "count": 1}], "missing": [3, 5, 7, 15, 18, 20]},
            {"continent": "欧洲", "country": "SUI", "duplicate": [{"number": 1, "count": 2}, {"number": 18, "count": 1}], "missing": [2, 3, 4, 8, 9, 10, 12, 15]},
            {"continent": "欧洲", "country": "NED", "duplicate": [{"number": 5, "count": 2}, {"number": 7, "count": 3}, {"number": 9, "count": 1}, {"number": 10, "count": 1}, {"number": 11, "count": 1}, {"number": 13, "count": 1}, {"number": 14, "count": 1}, {"number": 15, "count": 1}, {"number": 16, "count": 1}, {"number": 19, "count": 1}], "missing": [1, 8, 18, 20]},
            {"continent": "欧洲", "country": "GER", "duplicate": [{"number": 2, "count": 1}, {"number": 3, "count": 1}, {"number": 6, "count": 1}, {"number": 11, "count": 1}, {"number": 13, "count": 2}, {"number": 14, "count": 1}], "missing": [4, 5, 7, 8, 16, 18, 19]},
            {"continent": "欧洲", "country": "TUR", "duplicate": [{"number": 6, "count": 1}, {"number": 7, "count": 2}, {"number": 8, "count": 2}, {"number": 11, "count": 1}, {"number": 12, "count": 2}, {"number": 14, "count": 2}, {"number": 20, "count": 1}], "missing": [2, 13, 16]},
            {"continent": "欧洲", "country": "SWE", "duplicate": [{"number": 6, "count": 2}, {"number": 7, "count": 1}, {"number": 12, "count": 1}, {"number": 15, "count": 2}], "missing": [2, 3, 4, 5, 10, 11, 13, 14, 17, 20]}
        ];

        const continentOrder = ['国际足联', '亚洲', '非洲', '南美', '中北美', '欧洲'];
        const continentIcons = {
            '国际足联': '🏆', '亚洲': '🌏', '非洲': '🌍',
            '南美': '🌎', '中北美': '🌎', '欧洲': '🌍'
        };

        function groupByContinent(data) {
            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.continent]) {
                    grouped[item.continent] = [];
                }
                grouped[item.continent].push(item);
            });
            return grouped;
        }

        function renderCards(searchTerm = '') {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            const groupedByContinent = groupByContinent(cardsData);

            let totalDuplicate = 0;
            let totalMissing = 0;
            cardsData.forEach(item => {
                item.duplicate.forEach(d => { totalDuplicate += d.count; });
                totalMissing += item.missing.length;
            });
            document.getElementById('totalDuplicate').textContent = totalDuplicate;
            document.getElementById('totalMissing').textContent = totalMissing;
            document.getElementById('totalCountries').textContent = cardsData.length;

            continentOrder.forEach(continent => {
                if (!groupedByContinent[continent]) return;

                const countries = groupedByContinent[continent].filter(item => {
                    return searchTerm === '' ||
                        item.country.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (nameMap[item.country] || '').includes(searchTerm);
                });

                if (countries.length === 0) return;

                const section = document.createElement('div');
                section.className = 'continent-section';
                section.innerHTML = `
                    <h2 class="continent-title">
                        <span class="continent-icon">${continentIcons[continent] || '🌍'}</span>
                        ${continent}
                    </h2>
                    <div class="cards-grid">
                        ${countries.map(item => {
                            const countryName = nameMap[item.country] || item.country;
                            const expandedDuplicate = [];
                            item.duplicate.forEach(d => {
                                for (let i = 0; i < d.count; i++) {
                                    expandedDuplicate.push(d.number);
                                }
                            });

                            return `
                            <div class="country-card" data-country="${item.country}">
                                <div class="country-header">
                                    <span class="country-name">
                                        <span class="country-flag">${countryName}</span>
                                        <span class="country-code">${item.country}</span>
                                    </span>
                                </div>
                                ${expandedDuplicate.length > 0 ? `
                                    <div class="section-label">
                                        <span class="dot dot-green"></span>
                                        可交换 (${expandedDuplicate.length}张)
                                    </div>
                                    <div class="card-numbers">
                                        ${expandedDuplicate.map(num =>
                                            `<span class="card-number duplicate">${num}</span>`
                                        ).join('')}
                                    </div>
                                ` : ''}
                                ${item.missing.length > 0 ? `
                                    <div class="section-label">
                                        <span class="dot dot-red"></span>
                                        需要 (${item.missing.length}张)
                                    </div>
                                    <div class="card-numbers">
                                        ${item.missing.map(m =>
                                            `<span class="card-number missing">${m}</span>`
                                        ).join('')}
                                    </div>
                                ` : ''}
                                ${expandedDuplicate.length === 0 && item.missing.length === 0 ?
                                    '<div class="empty-message">🎉 已完成收集！</div>' : ''
                                }
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        renderCards();

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCards(e.target.value);
        });
    </script>
</body>
</html>
